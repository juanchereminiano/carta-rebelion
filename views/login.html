<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grupo Soho · Analytics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      padding: 24px 16px;
      background: #f0edf8;
      background-image:
        radial-gradient(ellipse 120% 80% at 0% 0%, rgba(180,160,240,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 100% 100%, rgba(100,200,210,0.2) 0%, transparent 55%);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ── Logo ── */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .login-logo img {
      width: 220px;
      height: auto;
    }
    .login-tagline {
      font-size: 0.72rem;
      font-weight: 600;
      color: #004EA8;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* ── Card ── */
    .login-card {
      width: 100%;
      background: #fff;
      border: 1px solid rgba(0, 78, 168, 0.1);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow:
        0 4px 24px rgba(0, 78, 168, 0.08),
        0 1px 4px rgba(0, 0, 0, 0.04);
    }

    .login-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e3a6e;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .login-card-sub {
      font-size: 0.78rem;
      color: rgba(30, 58, 110, 0.45);
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── Divisor ── */
    .card-divider {
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, #004EA8 0%, #6ab0e8 100%);
      margin-bottom: 28px;
    }

    /* ── Fields ── */
    .field { margin-bottom: 20px; }
    .field:last-of-type { margin-bottom: 28px; }

    .field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      color: rgba(30, 58, 110, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .field-wrap { position: relative; }

    .field input {
      width: 100%;
      background: #f5f7fb;
      border: 1.5px solid rgba(0, 78, 168, 0.12);
      border-radius: 10px;
      padding: 13px 16px;
      color: #1e3a6e;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus {
      border-color: #004EA8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0, 78, 168, 0.1);
    }
    .field input::placeholder { color: rgba(30, 58, 110, 0.25); }
    .field input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #f5f7fb inset;
      -webkit-text-fill-color: #1e3a6e;
    }
    .field input[type="password"] { padding-right: 46px; }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(30, 58, 110, 0.3);
      font-size: 1.05rem;
      line-height: 1;
      padding: 4px;
      transition: color 0.15s;
    }
    .eye-btn:hover { color: #004EA8; }

    /* ── Submit ── */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #004EA8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-btn:hover:not(:disabled) {
      background: #0060cc;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 78, 168, 0.3);
    }
    .login-btn:active:not(:disabled) { transform: translateY(0); box-shadow: none; }
    .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .login-btn.loading::after {
      content: '';
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .login-error {
      margin-top: 14px;
      background: rgba(220,50,50,0.07);
      border: 1px solid rgba(220,50,50,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #c03030;
      font-size: 0.82rem;
      line-height: 1.45;
      display: none;
    }
    .login-error.show { display: block; }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      font-size: 0.65rem;
      color: rgba(30, 58, 110, 0.35);
      letter-spacing: 0.04em;
    }

    @media (max-width: 440px) {
      .login-card { padding: 28px 20px 24px; border-radius: 14px; }
      .login-logo img { width: 170px; }
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="login-logo">
    <img src="/img/grupo-soho-logo-hrz.png" alt="Grupo Soho" />
    <div class="login-tagline">Analytics Dashboard</div>
  </div>

  <div class="login-card">
    <div class="login-card-title">Bienvenido/a</div>
    <div class="login-card-sub">Ingresá con tu cuenta para continuar</div>
    <div class="card-divider"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="nombre@gruposoho.com"
          required autocomplete="email" inputmode="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="field-wrap">
          <input id="password" type="password" placeholder="••••••••"
            required autocomplete="current-password" />
          <button type="button" class="eye-btn" id="eye-btn" title="Mostrar contraseña">
            <span id="eye-icon">◉</span>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="login-btn">Ingresar</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>

  <div class="login-footer">Grupo Soho · Gastronomía + Cultura · Acceso restringido</div>

</div>

<script>
  // Toggle contraseña visible/oculta
  const eyeBtn   = document.getElementById('eye-btn');
  const eyeIcon  = document.getElementById('eye-icon');
  const passInput = document.getElementById('password');
  let showPass = false;
  eyeBtn.addEventListener('click', () => {
    showPass = !showPass;
    passInput.type = showPass ? 'text' : 'password';
    eyeIcon.textContent = showPass ? '◎' : '◉';
  });

  // Submit
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Ingresando…';
    btn.classList.add('loading');

    try {
      const res  = await fetch('/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          email:    document.getElementById('email').value.trim(),
          password: passInput.value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        // Siempre ir a /empresa para que el usuario seleccione la empresa
        window.location.href = '/empresa';
      } else {
        err.textContent = data.error || 'Error al ingresar. Revisá tus datos.';
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        btn.classList.remove('loading');
        passInput.value = '';
        passInput.focus();
      }
    } catch {
      err.textContent = 'No se pudo conectar al servidor.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
      btn.classList.remove('loading');
    }
  });
</script>
</body>
</html>
